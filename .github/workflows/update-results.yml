name: Update results

# Pulls live World Cup results from openfootball and commits them to data.json,
# which GitHub Pages then serves to everyone. Semi-live: runs every 20 minutes
# during the tournament window (11 Jun – 19 Jul 2026), plus on-demand.

on:
  workflow_dispatch:        # run manually any time from the Actions tab
  schedule:
    - cron: "*/20 * 11-30 6 *"   # every 20 min, 11–30 June
    - cron: "*/20 * 1-19 7 *"    # every 20 min, 1–19 July

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch + apply results
        run: python3 scripts/update_results.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto-update results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
